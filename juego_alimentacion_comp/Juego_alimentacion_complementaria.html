<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIAPD: Alimentación Complementaria</title>
    <style>
        :root { --azul: #3498db; --verde: #2ecc71; --rojo: #e74c3c; --oscuro: #2c3e50; }
        
        body { font-family: 'Poppins', sans-serif; background: #f0f4f8; margin: 0; padding: 0; text-align: center; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

        .btn-reset { position: fixed; top: 15px; right: 15px; z-index: 25000; background: white; border: 4px solid var(--azul); color: var(--azul); width: 60px; height: 60px; border-radius: 50%; cursor: pointer; font-size: 30px; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }

        #splash-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: white url('https://lh3.googleusercontent.com/d/1RHfQuqBqrfPaJqY5SEOeST2EZb2YgoG3') center center / contain no-repeat;
            z-index: 30000; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; 
            padding-bottom: 12.5vh; 
        }
        
        .btn-main { width: 135px; height: 135px; font-size: 16px; font-weight: 800; color: white; background: var(--azul); border: 6px solid white; border-radius: 50%; cursor: pointer; box-shadow: 0 10px 25px rgba(0,0,0,0.3); text-transform: uppercase; display: flex; align-items: center; justify-content: center; line-height: 1.1; }

        .scoreboard { display: flex; justify-content: center; gap: 15px; margin: 10px 0; }
        .team-card { background: white; padding: 5px 25px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-bottom: 6px solid #ccc; width: 140px; }
        .team-card.active { border-color: var(--azul); transform: scale(1.05); background: #eef7ff; }
        .team-card .points { font-size: 32px; font-weight: 900; color: var(--azul); }

        .main-game { display: flex; justify-content: center; gap: 15px; align-items: center; padding: 0 10px; }
        .canasta-wrapper { flex: 1; max-width: 280px; background: white; border-radius: 25px; padding: 15px; }
        .canasta-img { 
            width: 100%; height: 210px; background-size: contain; background-repeat: no-repeat; background-position: center bottom; 
            display: flex; flex-wrap: wrap; justify-content: center; align-content: flex-end; padding-bottom: 15px; 
        }
        
        #c1 .canasta-img { background-image: url('https://lh3.googleusercontent.com/d/1i7YCjqvLDVlBkkqNfWuJ1aF2EDqbTXmw'); }
        #c2 .canasta-img { background-image: url('https://lh3.googleusercontent.com/d/1ifva-mKsS-UKXqPmSabh3TY3mnJcIZMw'); }
        #c3 .canasta-img { background-image: url('https://lh3.googleusercontent.com/d/1ip1pT_Bhr7557F6yO-5wAOxkfyQUWsCL'); }

        .label-big { font-size: 22px; font-weight: 900; color: var(--oscuro); margin-top: 5px; display: block; }
        .age-label { font-size: 15px; font-weight: bold; color: #7f8c8d; display: block; }

        #prohibidos-box { 
            border: 3px dashed var(--rojo); background: white; margin: 10px auto; 
            width: 50%; max-width: 350px; border-radius: 15px; padding: 10px; 
            display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; 
            min-height: 60px; position: relative;
        }
        .inside-label { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); background: #f0f4f8; color: var(--rojo); font-weight: 900; padding: 0 10px; font-size: 14px; text-transform: uppercase; }

        .inventory { background: white; padding: 15px; display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; box-shadow: 0 -5px 20px rgba(0,0,0,0.1); flex-grow: 1; overflow: hidden; }
        .alimento { width: 90px; cursor: grab; text-align: center; }
        .alimento img { max-width: 85px; max-height: 85px; object-fit: contain; pointer-events: none; }
        .alimento p { margin: 2px 0; font-weight: bold; font-size: 11px; }

        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 40000; justify-content: center; align-items: center; flex-direction: column; color: white; text-shadow: 2px 2px 10px rgba(0,0,0,0.4); font-weight: 900; }
        #end-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #3498db 0%, #2c3e50 100%); z-index: 50000; flex-direction: column; justify-content: center; align-items: center; color: white; padding: 20px; }
        
        .in-basket { width: 45px !important; margin: 2px; }
        .in-basket p { display: none; }
        #prohibidos-box .in-basket { width: 35px !important; }
    </style>
</head>
<body>
    <button class="btn-reset" onclick="regresarAlInicio()">🔄</button>
    <div id="splash-screen"><button class="btn-main" onclick="iniciarJuego()">INICIAR<br>JUEGO</button></div>
    <div id="end-screen"><h1>🏆 RESULTADOS FINALES 🏆</h1><div style="display: flex; gap: 20px; justify-content: center; margin: 30px 0;" id="final-results"></div><h2 id="winner-text" style="font-size: 35px; margin-bottom: 30px;"></h2><button class="btn-main" onclick="regresarAlInicio()" style="width:auto; height:auto; border-radius:50px; padding:20px 60px;">REPETIR JUEGO</button></div>
    
    <audio id="snd-bg" loop autoplay preload="auto">
        <source src="cancionsiapd.mp3" type="audio/mpeg">
    </audio>
    <audio id="snd-success"><source src="https://actions.google.com/sounds/v1/human_voices/applause_long.ogg" type="audio/ogg"></audio>
    <audio id="snd-error"><source src="https://actions.google.com/sounds/v1/cartoon/boing.ogg" type="audio/ogg"></audio>

    <div class="scoreboard">
        <div class="team-card" id="team-0"><h2>EQUIPO 1</h2><div class="points" id="p-0">0</div></div>
        <div class="team-card" id="team-1"><h2>EQUIPO 2</h2><div class="points" id="p-1">0</div></div>
        <div class="team-card" id="team-2"><h2>EQUIPO 3</h2><div class="points" id="p-2">0</div></div>
    </div>

    <div class="main-game">
        <div class="canasta-wrapper" id="c1" data-cat="6-9"><div class="canasta-img"></div><span class="label-big">Canasto 1</span><span class="age-label">(6 a 9 meses)</span></div>
        <div class="canasta-wrapper" id="c2" data-cat="9-11"><div class="canasta-img"></div><span class="label-big">Canasto 2</span><span class="age-label">(9 a 11 meses)</span></div>
        <div class="canasta-wrapper" id="c3" data-cat="11-24"><div class="canasta-img"></div><span class="label-big">Canasto 3</span><span class="age-label">(11 a 24 meses)</span></div>
    </div>

    <div id="prohibidos-box" class="drop-zone"><span class="inside-label">ALIMENTOS PROHIBIDOS</span></div>
    <div class="inventory" id="alimentos-box"></div>
    <div id="overlay" class="overlay"><h1 id="overlay-title" style="font-size: 60px;"></h1><p id="overlay-msg" style="font-size: 35px;"></p></div>

    <script>
        let turno = 0; let puntajes = [0, 0, 0]; let restantes = 0;
        const musica = document.getElementById('snd-bg');
        
        const datos = [
            { n: "Puré de Ahuyama", c: "6-9", img: "https://lh3.googleusercontent.com/d/1clsjdGXXum2WpSzyvUANfkwf7fcvnNKS" },
            { n: "Puré de Papa", c: "6-9", img: "https://lh3.googleusercontent.com/d/1v8Ye2oXNalhTQQ71-ac3FoqGzQ66aMnA" },
            { n: "Banano Triturado", c: "6-9", img: "https://lh3.googleusercontent.com/d/1S-z2JzDyzNaeGWMi-p-BvqJO07XiFxlr" },
            { n: "Pollo Desmenuzado", c: "6-9", img: "https://lh3.googleusercontent.com/d/13QBAIe8DQvHggrKf891gp2uMsORxjcat" },
            { n: "Fríjol Triturado", c: "6-9", img: "https://lh3.googleusercontent.com/d/1D8KC8AJEKO4hc2vPa9tqkNcLFZD7-fNn" },
            { n: "Arroz con Lentejas", c: "9-11", img: "https://lh3.googleusercontent.com/d/1SKFpBkUDujO7y1pZbgdB6QecVgBB_CmJ" },
            { n: "Huevo Revuelto", c: "9-11", img: "https://lh3.googleusercontent.com/d/1Q2p5rCcMhQKcGv4d4bOKlCaPz4jiNCRn" },
            { n: "Aguacate", c: "9-11", img: "https://lh3.googleusercontent.com/d/1F0T5xyHCe20YspViHET1wxqw87LMZzF1" },
            { n: "Plátano Cocido", c: "9-11", img: "https://lh3.googleusercontent.com/d/1Y7xJBfLyrv5IACBqZlwMqYfsPO5NdlnI" },
            { n: "Verduras Cocidas", c: "9-11", img: "https://lh3.googleusercontent.com/d/1pgkhBRkRNARnvwAT_2uy-kmm9yQ8haqN" },
            { n: "Arroz", c: "11-24", img: "https://lh3.googleusercontent.com/d/13vgaLgZZa_YoQ5_uPfmb129CRAZVFUj8" },
            { n: "Carne Desmechada", c: "11-24", img: "https://lh3.googleusercontent.com/d/1EJFspgVBb3mEP1SF4d3ze0yqc7d136jF" },
            { n: "Arepa", c: "11-24", img: "https://lh3.googleusercontent.com/d/131Sk_TFaB5uirI7T9g9x3F4nceeVZK9x" },
            { n: "Frutas Picadas", c: "11-24", img: "https://lh3.googleusercontent.com/d/1KBiKK9xMHQJZlGDpc-0O7lhptozxsc5r" },
            { n: "Fríjoles o Lentejas", c: "11-24", img: "https://lh3.googleusercontent.com/d/16JTRbj08hpgP5BUPEdI5zWQeX3mU7ldK" },
            { n: "Leche de Vaca", c: "prohibido", img: "https://lh3.googleusercontent.com/d/1tUp_8TGTLIf64iOJ3IRhH78F7bus6l06" },
            { n: "Gaseosa", c: "prohibido", img: "https://lh3.googleusercontent.com/d/12Tghacyb5fPJX_VhPKfg_v3HXmcp2gHW" },
            { n: "Café", c: "prohibido", img: "https://lh3.googleusercontent.com/d/1D4I8VoFX_rzr2tAhQexml_d1jQI9ehs3" },
            { n: "Dulces", c: "prohibido", img: "https://lh3.googleusercontent.com/d/1PSrdN3FmwI2zyn_Nrs5pNipE_lEsGH1b" },
            { n: "Papas de Paquete", c: "prohibido", img: "https://lh3.googleusercontent.com/d/1ELNr2kqnwbnuCoNwUdrOhtgypmYtZR2c" }
        ];

        function iniciarJuego() { document.getElementById('splash-screen').style.display = 'none'; musica.volume = 0.3; musica.play(); reset(); }
        function regresarAlInicio() { document.getElementById('splash-screen').style.display = 'flex'; document.getElementById('end-screen').style.display = 'none'; musica.pause(); reset(); }

        function reset() {
            puntajes = [0, 0, 0]; turno = 0; restantes = datos.length;
            document.querySelectorAll('.canasta-img').forEach(c => c.innerHTML = '');
            document.getElementById('prohibidos-box').innerHTML = '<span class="inside-label">ALIMENTOS PROHIBIDOS</span>';
            for(let i=0; i<3; i++) { document.getElementById(`p-${i}`).textContent = '0'; document.getElementById(`team-${i}`).classList.remove('active'); }
            const box = document.getElementById('alimentos-box'); box.innerHTML = '';
            const list = [...datos].sort(() => Math.random() - 0.5);
            list.forEach((a, i) => {
                const d = document.createElement('div'); d.className = 'alimento'; d.draggable = true; d.id = 'a' + i; d.dataset.cat = a.c;
                d.innerHTML = `<img src="${a.img}"><p>${a.n}</p>`;
                d.addEventListener('dragstart', e => e.dataTransfer.setData('text', e.target.id));
                box.appendChild(d);
            });
            msg("¡TURNO EQUIPO 1!", "¡Suerte!", "#3498db"); setTimeout(() => document.getElementById('overlay').style.display = 'none', 1500);
        }

        function handleDrop(e, targetCat, targetElement) {
            e.preventDefault(); const el = document.getElementById(e.dataTransfer.getData('text')); if (!el) return;
            if (el.dataset.cat === targetCat) {
                puntajes[turno] += 10; document.getElementById('snd-success').play();
                const cl = el.cloneNode(true); cl.classList.add('in-basket');
                (targetElement.querySelector('.canasta-img') || targetElement).appendChild(cl);
                el.remove(); restantes--;
                msg("¡CORRECTO! 🎯", "+10 PUNTOS", "#2ecc71");
                if (restantes <= 0) { setTimeout(finalizar, 1500); } else { setTimeout(sig, 1500); }
            } else {
                document.getElementById('snd-error').play();
                msg("¡INCORRECTO! ❌", "Siguiente equipo...", "#e74c3c");
                setTimeout(sig, 1500);
            }
        }

        document.querySelectorAll('.canasta-wrapper').forEach(t => {
            t.addEventListener('dragover', e => e.preventDefault());
            t.addEventListener('drop', e => handleDrop(e, t.dataset.cat, t));
        });

        const forbBox = document.getElementById('prohibidos-box');
        forbBox.addEventListener('dragover', e => e.preventDefault());
        forbBox.addEventListener('drop', e => handleDrop(e, 'prohibido', forbBox));

        function sig() {
            if (restantes <= 0) return;
            turno = (turno + 1) % 3;
            for(let i=0; i<3; i++) {
                document.getElementById(`p-${i}`).textContent = puntajes[i];
                document.getElementById(`team-${i}`).classList.remove('active');
            }
            document.getElementById(`team-${turno}`).classList.add('active');
            msg(`TURNO EQUIPO ${turno+1}`, "¡Adelante!", "#3498db");
            setTimeout(() => document.getElementById('overlay').style.display = 'none', 1500);
        }

        function finalizar() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('end-screen').style.display = 'flex';
            document.getElementById('final-results').innerHTML = puntajes.map((p, i) => `<div style="background:white; color:black; padding:15px 30px; border-radius:15px; border-bottom:8px solid #ccc;"><h3>EQUIPO ${i+1}</h3><div style="font-size:40px; font-weight:900">${p}</div></div>`).join('');
        }

        function msg(t, m, c) {
            const ov = document.getElementById('overlay');
            document.getElementById('overlay-title').textContent = t;
            document.getElementById('overlay-msg').textContent = m;
            ov.style.backgroundColor = c + "f2";
            ov.style.display = 'flex';
        }
    </script>
</body>
</html>
